<!DOCTYPE html>
<html>
<head>
  <title>Chloe & Marin Babysitting</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #fdf6f9;
      text-align: center;
    }

    header {
      background: pink;
      padding: 20px;
    }

    h1 {
      margin: 0;
    }

    .section {
      padding: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      background: hotpink;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>Chloe & Marin Babysitting</h1>
  <p>Reliable • Fun • Caring</p>
</header>

<div class="section">
  <div class="card">
    <h2>About Us</h2>
    <p>We are experienced babysitters who love working with kids!</p>
  </div>

  <div class="card">
    <h2>Contact</h2>
    <p>Email: babysitting@email.com</p>
    <button onclick="alert('Text us to book!')">Book Now</button>
  </div>
</div>

</body>
</html>
